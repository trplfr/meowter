services:
  postgres-dev:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-meowter_dev}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-meowter_dev}
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    networks:
      - internal-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-meowter_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-dev:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_dev:/data
    networks:
      - internal-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-dev:
    image: ghcr.io/trplfr/meowter-api:dev
    restart: unless-stopped
    env_file: .env.dev
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-meowter_dev}:${DB_PASSWORD}@postgres-dev:5432/${DB_NAME:-meowter_dev}
      REDIS_URL: redis://redis-dev:6379
    volumes:
      - ./uploads-dev:/app/uploads
    depends_on:
      postgres-dev:
        condition: service_healthy
      redis-dev:
        condition: service_healthy
    networks:
      - internal-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-dev:
    image: ghcr.io/trplfr/meowter-web:dev
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SSR_API_URL: http://api-dev:4000/api
    depends_on:
      - api-dev
    networks:
      - internal-dev

networks:
  internal-dev:

volumes:
  pg_data_dev:
  redis_data_dev:
