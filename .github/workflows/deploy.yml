name: Deploy

on:
  push:
    branches: [dev, master]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/trplfr/meowter-api
  WEB_IMAGE: ghcr.io/trplfr/meowter-web

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.API_IMAGE }}:${{ github.sha }}

  build-web:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "tag=prod" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.WEB_IMAGE }}:${{ github.sha }}

  deploy:
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "compose=docker-compose.prod.yml" >> $GITHUB_OUTPUT
            echo "envfile=.env.prod" >> $GITHUB_OUTPUT
            echo "api=api-prod" >> $GITHUB_OUTPUT
            echo "web=web-prod" >> $GITHUB_OUTPUT
          else
            echo "compose=docker-compose.dev.yml" >> $GITHUB_OUTPUT
            echo "envfile=.env.dev" >> $GITHUB_OUTPUT
            echo "api=api-dev" >> $GITHUB_OUTPUT
            echo "web=web-dev" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/meowter
            git pull --ff-only
            docker compose -f ${{ steps.env.outputs.compose }} --env-file ${{ steps.env.outputs.envfile }} pull ${{ steps.env.outputs.api }} ${{ steps.env.outputs.web }}
            docker compose -f ${{ steps.env.outputs.compose }} --env-file ${{ steps.env.outputs.envfile }} up -d --no-deps ${{ steps.env.outputs.api }} ${{ steps.env.outputs.web }}
            docker image prune -f
