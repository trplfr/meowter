services:
  postgres-prod:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-meowter}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-meowter}
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    networks:
      - internal-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-meowter}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-prod:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_prod:/data
    networks:
      - internal-prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-prod:
    image: ghcr.io/trplfr/meowter-api:prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-meowter}:${DB_PASSWORD}@postgres-prod:5432/${DB_NAME:-meowter}
      REDIS_URL: redis://redis-prod:6379
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
    networks:
      - internal-prod
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-prod:
    image: ghcr.io/trplfr/meowter-web:prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SSR_API_URL: http://api-prod:4000/api
    depends_on:
      - api-prod
    networks:
      - internal-prod

networks:
  internal-prod:

volumes:
  pg_data_prod:
  redis_data_prod:
