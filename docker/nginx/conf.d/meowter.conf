# docker DNS resolver
resolver 127.0.0.11 valid=10s;

# http -> https (все домены)
server {
    listen 80;
    server_name meowter.app meowter.ru dev.meowter.app dev.meowter.ru www.meowter.app www.meowter.ru;

    location / {
        return 301 https://$host$request_uri;
    }
}

# =====================
# PRODUCTION
# =====================

# meowter.app (EN)
server {
    listen 443 ssl;
    server_name meowter.app www.meowter.app;

    ssl_certificate /etc/nginx/certs/meowter.app/cert.pem;
    ssl_certificate_key /etc/nginx/certs/meowter.app/key.pem;
    include /etc/nginx/ssl-params.conf;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        set $api_prod api-prod;
        proxy_pass http://$api_prod:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        set $api_prod api-prod;
        proxy_pass http://$api_prod:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /app/uploads-prod/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        limit_req zone=page_limit burst=10 nodelay;
        set $web_prod web-prod;
        proxy_pass http://$web_prod:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

