# DEV
# =====================

# dev.meowter.app (EN)
server {
    listen 443 ssl;
    server_name dev.meowter.app;

    ssl_certificate /etc/nginx/certs/meowter.app/cert.pem;
    ssl_certificate_key /etc/nginx/certs/meowter.app/key.pem;
    include /etc/nginx/ssl-params.conf;

    auth_basic "Dev";
    auth_basic_user_file /etc/nginx/.htpasswd-dev;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        set $api_dev api-dev;
        proxy_pass http://$api_dev:4000;
        proxy_set_header Host $host;
