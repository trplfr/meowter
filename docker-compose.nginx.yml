services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl-params.conf:/etc/nginx/ssl-params.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./uploads:/app/uploads-prod:ro
      - ./uploads-dev:/app/uploads-dev:ro
    networks:
      - meowter_internal-prod
      - meowter_internal-dev
      - external

networks:
  meowter_internal-prod:
    external: true
  meowter_internal-dev:
    external: true
  external:
